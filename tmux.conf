# About   : tmux 3.x の設定ファイル。macOS / Ubuntu 共通

# ターミナルタイプ
# tmux-256color が推奨（tmux 3.x 以降）。Ubuntu で見つからない場合は sudo apt install ncurses-term
set -g  default-terminal "tmux-256color"
# 外側のターミナルが xterm-256color または tmux-256color の場合に 24bit カラーを有効化
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",tmux-256color:Tc"

# 動作
set -sg escape-time 10   # Esc キーの遅延を短縮（デフォルト 500ms は Vim との組み合わせで誤動作の原因になる）
set -g  focus-events on  # tmux 内の Vim に FocusGained/FocusLost イベントを渡す（autoread を正しく動作させるために必要）
set -g  history-limit 50000  # スクロールバックの行数（デフォルト 2000 行から拡大）
set -g  mouse on         # マウス操作を有効化
set -g  allow-rename off # コマンド実行時にウィンドウ名が自動変更されるのを防ぐ

# ステータスバー
set -g status-interval 1      # 更新間隔（秒）
set -g status-justify  centre # ウィンドウ一覧を中央揃え
set -g status-bg colour238    # 背景色
set -g status-fg colour255    # 文字色

# 左側: セッション名
set -g status-left-length 20
set -g status-left "#[fg=colour255,bg=colour241]Session: #S #[default]"

# 右側: ホスト名・ロードアベレージ・時刻（Mac は sysctl、Linux は /proc/loadavg）
set -g status-right-length 60
if-shell "uname | grep -q Darwin" \
    "set -g status-right '#[fg=colour255,bg=colour241] #h | LA: #(sysctl -n vm.loadavg | awk \"{print \\$2,\\$3,\\$4}\") | %m/%d %H:%M:%S#[default]'" \
    "set -g status-right '#[fg=colour255,bg=colour241] #h | LA: #(cut -d\" \" -f-3 /proc/loadavg) | %m/%d %H:%M:%S#[default]'"

# ウィンドウステータス
set -g window-status-format         " #I: #W "
set -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W #[default]"
