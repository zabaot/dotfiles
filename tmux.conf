# About   : tmux 3.x の設定ファイル。macOS / Ubuntu 共通
#
# ─── 基本操作 ────────────────────────────────────────────────────────────────
# tmux の操作はすべて「プレフィックスキー（Prefix）を押してから」行う。
# デフォルトの Prefix は Ctrl+B。
#
# ウィンドウ（タブのようなもの）:
#   Prefix c       新しいウィンドウを開く
#   Prefix n / p   次 / 前のウィンドウへ移動
#   Prefix 1〜9    番号でウィンドウへ移動（base-index 1 の場合 1 から始まる）
#   Prefix ,       ウィンドウ名を変更
#   Prefix &       現在のウィンドウを閉じる
#
# ペイン（画面分割）:
#   Prefix %       左右に分割
#   Prefix "       上下に分割
#   Prefix 矢印   隣のペインへ移動
#   Prefix x       現在のペインを閉じる
#   Prefix z       現在のペインを一時的に全画面表示（もう一度で元に戻る）
#
# セッション（tmux 全体の作業単位）:
#   Prefix d       セッションをデタッチ（バックグラウンドで維持したままターミナルを離れる）
#   tmux attach    最後のセッションに再接続
#   tmux ls        セッション一覧を表示
#
# スクロール:
#   Prefix [       スクロールモードに入る（矢印キー / PageUp / PageDown で移動）
#   q              スクロールモードを抜ける
# ─────────────────────────────────────────────────────────────────────────────

# ─── ターミナルタイプ ─────────────────────────────────────────────────────────
# tmux が内部で使うターミナルタイプを指定する。
# tmux-256color は tmux 3.x 以降の推奨値。
# Ubuntu でエラーが出る場合は: sudo apt install ncurses-term
set -g default-terminal "tmux-256color"

# 外側のターミナル（iTerm2 や GNOME Terminal など）が 24bit カラー対応の場合に
# tmux 内でも 24bit フルカラーを有効にする（Tc フラグで通知）。
# これがないと Vim のカラースキームが 256 色に落ちる。
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",tmux-256color:Tc"

# ─── 動作 ────────────────────────────────────────────────────────────────────
# Esc キーを押してから tmux がキーシーケンスの続きを待つ時間（ミリ秒）。
# デフォルト 500ms のままだと Vim で Esc を押したときの反応が遅延する。
set -sg escape-time 10

# tmux 内で Vim を使うとき、ウィンドウ切り替えやフォーカス変更を
# Vim 側に通知する（FocusGained / FocusLost イベント）。
# これがないと Vim の autoread（外部変更の自動読み込み）が tmux 内で動作しない。
set -g focus-events on

# スクロールバックバッファの最大行数。
# デフォルトは 2000 行。ログを遡ることが多い場合は増やす。
# 増やしすぎるとメモリを消費するため 50000 行程度が現実的。
# 操作: Prefix [ でスクロールモードに入ってから矢印キーや PageUp で遡る。
set -g history-limit 50000

# コマンド実行時にウィンドウ名が自動的に変わるのを防ぐ。
# デフォルトでは実行中コマンド名（bash, vim, git など）にウィンドウ名が変わる。
# off にすると Prefix , で設定した名前が維持される。
set -g automatic-rename off

# OSC 52 エスケープシーケンスを使ってターミナルのクリップボードと連携する。
# 対応ターミナル（iTerm2、Windows Terminal など）では tmux 内でコピーした
# テキストがシステムクリップボードにも入る。
set -g set-clipboard on

# ─── インデックス ─────────────────────────────────────────────────────────────
# ウィンドウ番号を 0 ではなく 1 から開始する。
# キーボードの 1〜0 の並びに合わせることで、Prefix 1 が「左端のウィンドウ」になる
#（0 始まりだと Prefix 0 が「左端」になり、0 キーは右端にあるため不便）。
set -g base-index 1

# ペイン番号も同様に 1 から開始する。
setw -g pane-base-index 1

# ウィンドウを閉じたとき番号の抜けを自動で詰める。
# 例: ウィンドウ 1, 2, 3 があって 2 を閉じると → 1, 2 に自動でリナンバリングされる
#（設定なしだと 1, 3 のまま残る）。
set -g renumber-windows on

# ─── ステータスバー ───────────────────────────────────────────────────────────
# ステータスバーは画面下部に表示される情報バー。
# 左: セッション名 ／ 中央: ウィンドウ一覧 ／ 右: ホスト名・負荷・時刻

# 1秒ごとに表示を更新する（時刻表示をリアルタイムに保つため）。
set -g status-interval 1

# ウィンドウ一覧を中央揃えにする。
set -g status-justify centre

# ステータスバーの背景色・文字色（tmux 2.9+ の style 形式）。
set -g status-style "bg=colour238,fg=colour255"

# 左側: セッション名を表示する。
# #S はセッション名に展開される tmux の変数。
set -g status-left-length 20
set -g status-left "#[fg=colour255,bg=colour241]Session: #S #[default]"

# 右側: ホスト名・ロードアベレージ（1分・5分・15分）・日時を表示する。
# #h はホスト名。#(...) はシェルコマンドの出力を埋め込む。
# ロードアベレージの取得方法が macOS（sysctl）と Linux（/proc/loadavg）で異なるため分岐。
set -g status-right-length 60
if-shell "uname | grep -q Darwin" \
    "set -g status-right '#[fg=colour255,bg=colour241] #h | LA: #(sysctl -n vm.loadavg | awk \"{print \\$2,\\$3,\\$4}\") | %m/%d %H:%M:%S#[default]'" \
    "set -g status-right '#[fg=colour255,bg=colour241] #h | LA: #(cut -d\" \" -f-3 /proc/loadavg) | %m/%d %H:%M:%S#[default]'"

# ウィンドウ一覧の表示形式。
# #I はウィンドウ番号、#W はウィンドウ名に展開される。
# current-format は現在アクティブなウィンドウの表示形式。
set -g window-status-format         " #I: #W "
set -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W #[default]"
